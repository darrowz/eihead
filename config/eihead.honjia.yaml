node_id: honjia

runtime:
  host: ${EIHEAD_RUNTIME_HOST:-0.0.0.0}
  port: ${EIHEAD_RUNTIME_PORT:-18081}
  neck_reframe:
    enabled: ${EIHEAD_NECK_REFRAME_ENABLED:-false}
    interval_s: ${EIHEAD_NECK_REFRAME_INTERVAL_S:-0.8}
    require_voice_awake: ${EIHEAD_NECK_REFRAME_REQUIRE_VOICE_AWAKE:-false}
    config:
      pan_min_deg: ${EIHEAD_NECK_REFRAME_PAN_MIN_DEG:-40}
      pan_max_deg: ${EIHEAD_NECK_REFRAME_PAN_MAX_DEG:-140}
      home_pan_deg: ${EIHEAD_NECK_REFRAME_HOME_PAN_DEG:-90}
      comfort_min_x: ${EIHEAD_NECK_REFRAME_COMFORT_MIN_X:-0.18}
      comfort_max_x: ${EIHEAD_NECK_REFRAME_COMFORT_MAX_X:-0.82}
      clear_min_x: ${EIHEAD_NECK_REFRAME_CLEAR_MIN_X:-0.30}
      clear_max_x: ${EIHEAD_NECK_REFRAME_CLEAR_MAX_X:-0.70}
      confirm_frames: ${EIHEAD_NECK_REFRAME_CONFIRM_FRAMES:-3}
      reframe_step_deg: ${EIHEAD_NECK_REFRAME_STEP_DEG:-5}
      return_step_deg: ${EIHEAD_NECK_REFRAME_RETURN_STEP_DEG:-4}
      min_command_interval_s: ${EIHEAD_NECK_REFRAME_MIN_COMMAND_INTERVAL_S:-1.0}
      observe_hold_s: ${EIHEAD_NECK_REFRAME_OBSERVE_HOLD_S:-1.5}
      cooldown_s: ${EIHEAD_NECK_REFRAME_COOLDOWN_S:-3.0}
      anti_oscillation_cooldown_s: ${EIHEAD_NECK_REFRAME_ANTI_OSCILLATION_COOLDOWN_S:-3.0}

monitor:
  host: ${EIHEAD_MONITOR_HOST:-0.0.0.0}
  port: ${EIHEAD_MONITOR_PORT:-18080}

legacy:
  eibrain_config_path: ${EIHEAD_LEGACY_EIBRAIN_CONFIG:-config/eibrain.honjia.yaml}
  body_runtime_config_path: ${EIHEAD_LEGACY_BODY_CONFIG:-config/eibrain.honjia.yaml}

devices:
  camera:
    path: /dev/video0
    framerate: 30
    frame_path: /tmp/eibrain-vision/latest.jpg
    state_path: /tmp/eibrain-vision/state.json
  hailo:
    path: /dev/hailo0
    hef_path: /usr/share/hailo-models/yolov5s_personface_h8l.hef
    postprocess_so_path: /usr/lib/aarch64-linux-gnu/hailo/tappas/post_processes/libyolo_hailortpp_post.so
    postprocess_config_path: /usr/share/hailo-models/yolov5_personface.json
    postprocess_function: filter
    score_threshold: 0.3
    inference_width: 640
    inference_height: 640
    inference_format: RGB
    evidence_dir: /tmp/eibrain-vision/evidence
    evidence_min_interval_s: ${EIHEAD_VISION_EVIDENCE_INTERVAL_S:-1.0}
    evidence_max_files: ${EIHEAD_VISION_EVIDENCE_MAX_FILES:-240}
    evidence_max_age_s: ${EIHEAD_VISION_EVIDENCE_MAX_AGE_S:-600}
    labels:
      - person
      - face
  i2c:
    path: /dev/i2c-1
    bus: 1
  microphone:
    path: /dev/snd
    device: plughw:CARD=U4K,DEV=0
    sample_rate: 16000
    channels: 1
  speaker:
    path: ""
    device: plughw:CARD=SPA3700,DEV=0
  neck:
    path: /dev/i2c-1
    axis: yaw
    i2c_addr: "0x2B"
    servo_id: 1
    hardware_verified: true
    motion_verified: true
    motion_evidence: operator_observed_s1_pan_servo
    pan_deg: [0, 180]
    tilt_deg: null

capabilities:
  software:
    asr:
      enabled: true
      provider: sherpa_onnx
      model: sense-voice
      model_dir: /mnt/ssd/models/sense-voice
      model_type: sense_voice
      vad_rms_threshold: 0.12
      vad_min_voice_ms: 720
      vad_end_silence_ms: 600
      max_utterance_ms: 5000
      limits:
        streaming: true
        languages: [zh]
    tts:
      enabled: true
      provider: minimax
      model: speech-2.8-hd
      api_base_url: https://api.minimaxi.com
      voice_id: female-shaonv
      audio_format: wav
      sample_rate: 32000
      fallback_provider: piper
      piper_command: /usr/local/bin/piper
      piper_model_path: /var/lib/eihead/models/piper/zh_CN-huayan-medium.onnx
      piper_config_path: /var/lib/eihead/models/piper/zh_CN-huayan-medium.onnx.json
      playback_echo_cooldown_ms: 1200
      limits:
        streaming: false
        languages: [zh]
    dialogue:
      enabled: true
      provider: openclaw_realtime
      transport_provider: ${EIHEAD_VOICE_TRANSPORT_PROVIDER:-openclaw_realtime}
      fallback_transport_provider: ${EIHEAD_VOICE_FALLBACK_PROVIDER:-eibrain_subprocess}
      ws_url: ${EIHEAD_OPENCLAW_WS_URL:-ws://100.110.190.107:18789}
      token_env_var: ${EIHEAD_OPENCLAW_TOKEN_ENV_VAR:-OPENCLAW_REALTIME_TOKEN}
      realtime_provider: ${EIHEAD_OPENCLAW_PROVIDER:-openai}
      ws_protocol: ${EIHEAD_OPENCLAW_WS_PROTOCOL:-4}
      barge_in_enabled: ${EIHEAD_OPENCLAW_BARGE_IN_ENABLED:-false}
      voice: ${EIHEAD_OPENCLAW_VOICE:-marin}
      brain_agent: ${EIHEAD_OPENCLAW_BRAIN_AGENT:-enabled}
      command: /opt/eihead/current/.venv/bin/python
      module: apps.cognitive_runtime
      cwd: /home/darrow/dev-project/eibrain
      config_path: /home/darrow/dev-project/eibrain/config/eibrain.honjia.yaml
      pythonpath: /home/darrow/dev-project/eibrain:/dev-project/eiprotocol
      timeout_s: 55
      session_id: honjia-voice
      actor_id: darrow
      head_instance_id: honjia
      brain_instance_id: honxin
      wake_word_required: true
      wake_words:
        - 鸿途
        - 宏图
        - 洪图
        - 黄土
        - 黄图
      end_phrases:
        - 结束对话
      wake_ack_text: ""
      end_ack_text: ""
      limits:
        protocol: eiprotocol
        transport: openclaw_realtime
        fallback_transport: eibrain_subprocess
    vision_backend:
      enabled: true
      backend: hailo
      model: personface-yolo
      limits:
        realtime: true
        max_fps: 15
    visual_identity:
      enabled: ${EIHEAD_VISUAL_IDENTITY_ENABLED:-true}
      provider: onnx_face_embedding
      model_path: ${EIHEAD_FACE_EMBEDDING_MODEL_PATH:-}
      registry_path: ${EIHEAD_VISUAL_IDENTITY_REGISTRY_PATH:-/var/lib/eihead/identity/people.json}
      match_threshold: ${EIHEAD_VISUAL_IDENTITY_THRESHOLD:-0.85}
      memory:
        enabled: ${EIHEAD_VISUAL_IDENTITY_MEMORY_ENABLED:-true}
        endpoint: ${EIHEAD_EIMEMORY_RPC_URL:-http://honxin:8091/}
        timeout_s: ${EIHEAD_EIMEMORY_RPC_TIMEOUT_S:-2.0}
        min_interval_s: ${EIHEAD_EIMEMORY_IDENTITY_MIN_INTERVAL_S:-60}
        scope:
          agent_id: honxin
          workspace_id: honjia
          user_id: darrow
          hardware_node: honjia
